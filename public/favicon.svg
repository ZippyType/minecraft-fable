<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="55%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="bladeShade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="guard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#6b3d19"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <rect x="8" y="8" width="48" height="48" rx="12" fill="none" stroke="#38bdf8" stroke-opacity="0.25" stroke-width="2"/>

  <g filter="url(#shadow)">
    <path d="M32 10l10 10-10 10-10-10z" fill="url(#blade)" stroke="#e2e8f0" stroke-width="1.2"/>
    <path d="M32 12l8 8-8 8-8-8z" fill="url(#bladeShade)"/>
    <rect x="28" y="18" width="8" height="8" fill="#f8fafc" opacity="0.75"/>
    <rect x="24" y="28" width="16" height="6" rx="2" fill="url(#guard)" stroke="#fde68a" stroke-width="1.2"/>
    <rect x="28" y="34" width="8" height="12" rx="2" fill="url(#handle)" stroke="#7c2d12" stroke-width="1.2"/>
    <rect x="29" y="46" width="6" height="8" rx="2" fill="#4b2e1f"/>
    <rect x="29" y="34" width="6" height="4" fill="#fbbf24" opacity="0.75"/>
    <rect x="24" y="30" width="16" height="2" fill="#fef3c7" opacity="0.9"/>
  </g>
</svg>
